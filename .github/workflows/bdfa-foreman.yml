name: BDFA Foreman

on:
  workflow_dispatch:
    inputs:
      milestone:
        description: 'Milestone number; leave blank for the first incomplete milestone'
        required: false
        type: string
      draft_pr:
        description: 'Open the generated pull request as a draft'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: bdfa-foreman
  cancel-in-progress: false

jobs:
  build:
    name: Build the selected milestone with Codex
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      pr_url: ${{ steps.publish.outputs.pr_url }}
      issue_url: ${{ steps.publish.outputs.issue_url }}
    steps:
      - name: Check out authoritative main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Select milestone
        id: milestone
        shell: bash
        env:
          REQUESTED_MILESTONE: ${{ inputs.milestone }}
        run: |
          set -euo pipefail
          mkdir -p .bdfa
          node scripts/bdfa-backlog.mjs select \
            --number "$REQUESTED_MILESTONE" \
            --context .bdfa/selected-milestone.md
          printf '.bdfa/\n' >> .git/info/exclude

      - name: Create milestone branch
        shell: bash
        env:
          BASE_BRANCH: ${{ steps.milestone.outputs.branch }}
        run: |
          set -euo pipefail
          branch="${BASE_BRANCH}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git switch -c "$branch"
          echo "BDFA_BRANCH=$branch" >> "$GITHUB_ENV"

      - name: Run Codex milestone agent
        id: codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/run-milestone.md
          codex-args: '["--ephemeral","--output-schema",".github/codex/schemas/planning-handoff.schema.json"]'
          sandbox: workspace-write
          safety-strategy: drop-sudo
          output-file: ${{ runner.temp }}/bdfa-planning-handoff.json

      - name: Remove runtime-only milestone context
        if: always()
        run: rm -rf .bdfa

      - name: Validate Codex changes
        id: validation
        if: steps.codex.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          bash scripts/ci.sh

      - name: Publish pull request or approval issue
        id: publish
        if: always() && steps.codex.outcome == 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MILESTONE_NUMBER: ${{ steps.milestone.outputs.number }}
          MILESTONE_TITLE: ${{ steps.milestone.outputs.title }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
          DRAFT_PR: ${{ inputs.draft_pr }}
          HANDOFF_FILE: ${{ runner.temp }}/bdfa-planning-handoff.json
        run: |
          set -euo pipefail

          if ! jq -e . "$HANDOFF_FILE" >/dev/null 2>&1; then
            echo '{"status":"blocked","summary":"Codex did not return a valid structured Planning Handoff."}' > "$HANDOFF_FILE"
          fi

          status="$(jq -r '.status // "blocked"' "$HANDOFF_FILE")"
          approval="$(jq -r '.approval_required // empty' "$HANDOFF_FILE")"
          summary="$(jq -r '.summary // "Codex milestone run completed."' "$HANDOFF_FILE")"

          dirty=false
          if [[ -n "$(git status --porcelain)" ]] || [[ "$(git rev-list --count main..HEAD)" -gt 0 ]]; then
            dirty=true
          fi

          if [[ "$dirty" == true ]]; then
            git config user.name "BDFA Foreman"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if [[ -n "$(git status --porcelain)" ]]; then
              git add -A
              git commit -m "feat: execute BDFA milestone ${MILESTONE_NUMBER}"
            fi

            credential_helper="$RUNNER_TEMP/git-credential-bdfa"
            printf '%s\n' \
              '#!/usr/bin/env sh' \
              'echo "username=x-access-token"' \
              'echo "password=$GH_TOKEN"' \
              > "$credential_helper"
            chmod 700 "$credential_helper"
            git -c credential.helper="$credential_helper" push --set-upstream origin "$BDFA_BRANCH"
            rm -f "$credential_helper"

            pr_body="$RUNNER_TEMP/bdfa-pr-body.md"
            {
              echo "## BDFA Foreman result"
              echo
              echo "**Milestone ${MILESTONE_NUMBER}: ${MILESTONE_TITLE}**"
              echo
              echo "$summary"
              echo
              echo "- Codex status: \`$status\`"
              echo "- Repository validation: \`$VALIDATION_OUTCOME\`"
              if [[ -n "$approval" ]]; then
                echo "- Approval boundary: $approval"
              fi
              echo
              echo "<details><summary>Structured Planning Handoff</summary>"
              echo
              echo '```json'
              jq . "$HANDOFF_FILE"
              echo '```'
              echo "</details>"
              echo
              echo "Generated by the manually triggered BDFA Foreman workflow. No live Supabase, RLS, authentication, provider-token, paid-service, or destructive action is authorized by this pull request."
            } > "$pr_body"

            draft_flag=()
            if [[ "$DRAFT_PR" == "true" || "$VALIDATION_OUTCOME" != "success" || "$status" != "completed" ]]; then
              draft_flag=(--draft)
            fi

            pr_url="$(gh pr create \
              --base main \
              --head "$BDFA_BRANCH" \
              --title "Milestone ${MILESTONE_NUMBER}: ${MILESTONE_TITLE}" \
              --body-file "$pr_body" \
              "${draft_flag[@]}")"
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          else
            issue_body="$RUNNER_TEMP/bdfa-issue-body.md"
            {
              echo "## BDFA Foreman handoff"
              echo
              echo "**Milestone ${MILESTONE_NUMBER}: ${MILESTONE_TITLE}**"
              echo
              echo "$summary"
              echo
              if [[ -n "$approval" ]]; then
                echo "### Approval required"
                echo
                echo "$approval"
                echo
              fi
              echo '```json'
              jq . "$HANDOFF_FILE"
              echo '```'
            } > "$issue_body"
            issue_url="$(gh issue create \
              --title "Milestone ${MILESTONE_NUMBER} handoff: ${MILESTONE_TITLE}" \
              --body-file "$issue_body")"
            echo "issue_url=$issue_url" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail clearly when Codex could not run
        if: steps.codex.outcome != 'success'
        shell: bash
        run: |
          echo "Codex did not complete. Confirm the OPENAI_API_KEY repository secret exists and review the Codex step logs." >&2
          exit 1

      - name: Record workflow summary
        if: always()
        shell: bash
        env:
          PR_URL: ${{ steps.publish.outputs.pr_url }}
          ISSUE_URL: ${{ steps.publish.outputs.issue_url }}
        run: |
          {
            echo "## BDFA Foreman"
            echo
            if [[ -n "$PR_URL" ]]; then
              echo "Created pull request: $PR_URL"
            elif [[ -n "$ISSUE_URL" ]]; then
              echo "Created approval/blocker issue: $ISSUE_URL"
            else
              echo "No pull request or issue was created. Review the failed step above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
